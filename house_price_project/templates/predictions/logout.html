{% extends 'predictions/base.html' %}

{% block title %}Logout - House Price Prediction{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body py-5">
                    <i class="fas fa-sign-out-alt fa-4x text-primary mb-4"></i>
                    <h2 class="mb-3">You have been logged out</h2>
                    <p class="text-muted mb-4">Thank you for using House Price Predictor</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'login' %}" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-2"></i>Login Again
                        </a>
                        <a href="{% url 'home' %}" class="btn btn-outline-primary">
                            <i class="fas fa-home me-2"></i>Go to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
